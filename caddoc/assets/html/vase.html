<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,   initial-scale=1.0">
    <title>Document</title>
</head>

<body style="margin: 0px;padding: 0px;">
    <script type="module" src="./../js/model-viewer.min.js"></script>
    <script src="./../js/save-png.js"></script>
    <model-viewer src="./../models/vase.glb" skybox-image="./../enviroment/env1.hdr" 
    
    ar
        ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" shadow-intensity="0"
        exposure="2" shadow-softness="0" style="width: 100%; height: 100vh; margin: 0px; background-color: #505050;">

        
        
    </model-viewer>
    <script>
        const mv = document.querySelector('model-viewer');
        mv.addEventListener('load', () => {
            
            const material0 = mv.model.materials[0];
            material0.pbrMetallicRoughness.setMetallicFactor(0.2);
            material0.setThicknessFactor(1.0);

                
        });


    </script>


</body>

</html>
